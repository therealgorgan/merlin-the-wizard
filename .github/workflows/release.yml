name: Build & publish release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.5.1). Must already exist in the repo.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Windows installer + portable
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version:     $TAG_VERSION"
          echo "package.json:    $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm ci

      - name: Build with electron-builder
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        shell: bash
        run: ls -la dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*Setup*.exe
            dist/*Portable*.exe
            dist/latest.yml
